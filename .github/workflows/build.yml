name: Build YouTube Tweaks (stable)

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: macos-latest

    steps:
      # ─────────────────────────────
      # Checkout Master Repo
      # ─────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ─────────────────────────────
      # Dependencies
      # ─────────────────────────────
      - name: Install tools
        run: brew install make xz

      # ─────────────────────────────
      # Theos Setup
      # ─────────────────────────────
      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "PATH=$HOME/theos/bin:$PATH" >> $GITHUB_ENV

      # ─────────────────────────────
      # SDK Setup
      # ─────────────────────────────
      - name: Setup SDK
        run: |
          rm -rf $HOME/theos/sdks
          git clone --depth 1 https://github.com/theos/sdks.git $HOME/theos/sdks

      # ─────────────────────────────
      # PSHeader (WICHTIG – korrekt installiert)
      # ─────────────────────────────
      - name: Setup PSHeader
        run: |
          git clone https://github.com/Ihaveadream19/PSHeader.git $HOME/theos/include/PSHeader

      # ─────────────────────────────
      # Clone Projects
      # ─────────────────────────────
      - name: Clone YouPiP
        run: git clone https://github.com/Ihaveadream19/YouPiP.git

      - name: Clone YTVideoOverlay
        run: git clone https://github.com/Ihaveadream19/YTVideoOverlay.git

      # ─────────────────────────────
      # Build YouPiP
      # ─────────────────────────────
      - name: Build YouPiP dylib
        run: |
          cd YouPiP
          make clean
          make

      # ─────────────────────────────
      # Build YTVideoOverlay
      # ─────────────────────────────
      - name: Build YTVideoOverlay dylib
        run: |
          cd YTVideoOverlay
          make clean
          make

      # ─────────────────────────────
      # Collect outputs
      # ─────────────────────────────
      - name: Collect dylibs
        run: |
          mkdir -p output
          find YouPiP/.theos -name "*.dylib" -exec cp {} output/ \;
          find YTVideoOverlay/.theos -name "*.dylib" -exec cp {} output/ \;

      # ─────────────────────────────
      # Upload artifacts
      # ─────────────────────────────
      - name: Upload dylibs
        uses: actions/upload-artifact@v4
        with:
          name: YouTubeTweaks-dylibs
          path: output/
