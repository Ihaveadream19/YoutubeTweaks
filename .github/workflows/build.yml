name: Build YouTube Tweaks (2 dylibs)

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Master Repo
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          brew install make xz

      # ─────────────────────────────
      # Theos Setup
      # ─────────────────────────────
      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "PATH=$HOME/theos/bin:$PATH" >> $GITHUB_ENV

      # ─────────────────────────────
      # SDK
      # ─────────────────────────────
      - name: Setup iOS SDK
        run: |
          rm -rf $HOME/theos/sdks
          git clone https://github.com/theos/sdks.git $HOME/theos/sdks

      # ─────────────────────────────
      # Dependencies (Headers)
      # ─────────────────────────────
      - name: Clone YouTubeHeader
        run: git clone https://github.com/Ihaveadream19/YouTubeHeader.git

      - name: Clone PSHeader
        run: git clone https://github.com/PoomSmart/PSHeader.git

      # ─────────────────────────────
      # Clone Tweaks
      # ─────────────────────────────
      - name: Clone YouPiP
        run: git clone https://github.com/Ihaveadream19/YouPiP.git

      - name: Clone YTVideoOverlay
        run: git clone https://github.com/Ihaveadream19/YTVideoOverlay.git

      # ─────────────────────────────
      # Build YouPiP
      # ─────────────────────────────
      - name: Build YouPiP dylib
        run: |
          cd YouPiP
          export THEOS_INCLUDE_PATHS=$PWD/../YouTubeHeader:$PWD/../PSHeader
          make clean
          make

      # ─────────────────────────────
      # Build YTVideoOverlay
      # ─────────────────────────────
      - name: Build YTVideoOverlay dylib
        run: |
          cd YTVideoOverlay
          export THEOS_INCLUDE_PATHS=$PWD/../YouTubeHeader
          make clean
          make

      # ─────────────────────────────
      # Collect outputs
      # ─────────────────────────────
      - name: Collect dylibs
        run: |
          mkdir -p output
          find YouPiP/.theos -name "*.dylib" -exec cp {} output/ \;
          find YTVideoOverlay/.theos -name "*.dylib" -exec cp {} output/ \;

      # ─────────────────────────────
      # Upload artifacts
      # ─────────────────────────────
      - name: Upload dylibs
        uses: actions/upload-artifact@v4
        with:
          name: YouTubeTweaks-dylibs
          path: output/
