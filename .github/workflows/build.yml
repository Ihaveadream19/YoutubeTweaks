name: Build YouTube Tweaks

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Install dependencies
        run: brew install make xz

      # ─────────────────────────────
      # Theos
      # ─────────────────────────────
      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "PATH=$HOME/theos/bin:$PATH" >> $GITHUB_ENV

      # ─────────────────────────────
      # SDK
      # ─────────────────────────────
      - name: Setup SDK
        run: |
          git clone https://github.com/theos/sdks.git $HOME/theos/sdks

      # ─────────────────────────────
      # Clone your projects
      # ─────────────────────────────
      - name: Clone YouPiP
        run: git clone https://github.com/Ihaveadream19/YouPiP.git

      - name: Clone YTVideoOverlay
        run: git clone https://github.com/Ihaveadream19/YTVideoOverlay.git

      # ─────────────────────────────
      # Headers (lokal fix)
      # ─────────────────────────────
      - name: Clone YouTubeHeader
        run: git clone https://github.com/Ihaveadream19/YouTubeHeader.git

      # ─────────────────────────────
      # Build YouPiP
      # ─────────────────────────────
      - name: Build YouPiP
        run: |
          cd YouPiP
          export THEOS_INCLUDE_PATHS=$PWD/../YouTubeHeader
          make clean
          make

      # ─────────────────────────────
      # Build YTVideoOverlay
      # ─────────────────────────────
      - name: Build YTVideoOverlay
        run: |
          cd YTVideoOverlay
          export THEOS_INCLUDE_PATHS=$PWD/../YouTubeHeader
          make clean
          make

      # ─────────────────────────────
      # Collect outputs
      # ─────────────────────────────
      - name: Collect dylibs
        run: |
          mkdir -p output
          find YouPiP/.theos -name "*.dylib" -exec cp {} output/ \;
          find YTVideoOverlay/.theos -name "*.dylib" -exec cp {} output/ \;

      # ─────────────────────────────
      # Upload
      # ─────────────────────────────
      - name: Upload dylibs
        uses: actions/upload-artifact@v4
        with:
          name: tweaked-dylibs
          path: output/
