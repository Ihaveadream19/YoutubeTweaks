name: Build Return YouTube Dislikes

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: macos-latest

    steps:
      # ─────────────────────────────
      # Checkout
      # ─────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ─────────────────────────────
      # Tools
      # ─────────────────────────────
      - name: Install tools
        run: brew install make xz

      # ─────────────────────────────
      # Theos setup
      # ─────────────────────────────
      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "PATH=$HOME/theos/bin:$PATH" >> $GITHUB_ENV

      # ─────────────────────────────
      # SDK setup
      # ─────────────────────────────
      - name: Setup iOS SDK
        run: |
          rm -rf $HOME/theos/sdks
          git clone --depth 1 https://github.com/theos/sdks.git $HOME/theos/sdks

      # ─────────────────────────────
      # PSHeader setup
      # ─────────────────────────────
      - name: Setup PSHeader
        run: |
          git clone https://github.com/Ihaveadream19/PSHeader.git PSHeader
          mkdir -p $THEOS/include/PSHeader
          cp -R PSHeader/* $THEOS/include/PSHeader/

      # ─────────────────────────────
      # Build tweak (dylib only)
      # ─────────────────────────────
      - name: Build tweak
        run: |
          make clean || true
          make

      # ─────────────────────────────
      # Collect dylib
      # ─────────────────────────────
      - name: Collect output
        run: |
          mkdir -p output
          find .theos -name "*.dylib" -exec cp {} output/ \;

      # ─────────────────────────────
      # Upload artifact
      # ─────────────────────────────
      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: Return-YouTube-Dislikes-dylib
          path: output/
